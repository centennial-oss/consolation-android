name: Release Preflight

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    if: github.repository_owner == 'centennial-oss' && github.ref_name == 'main'
    uses: ./.github/workflows/android-release.yml
    with:
      is_preflight: true
      build_number: ${{ github.run_number }}
      play_track: internal
    secrets: inherit
